<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEARVO — You're In!</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #080810;
  color: #F5F4F0;
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px;
}
.box {
  max-width: 480px;
}
.check {
  width: 72px; height: 72px;
  background: rgba(232,255,71,0.1);
  border: 1px solid #E8FF47;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  margin: 0 auto 32px;
  animation: pop 0.4s ease;
}
@keyframes pop {
  0% { transform: scale(0); opacity: 0; }
  80% { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}
.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 16px;
  letter-spacing: 0.15em;
  color: rgba(245,244,240,0.3);
  margin-bottom: 40px;
  text-transform: uppercase;
}
.logo span { color: #E8FF47; }
h1 {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 40px;
  line-height: 1.1;
  margin-bottom: 16px;
}
h1 span { color: #E8FF47; }
p {
  font-size: 16px;
  color: #888899;
  line-height: 1.6;
  margin-bottom: 40px;
  font-weight: 300;
}
.back {
  display: inline-block;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #080810;
  background: #E8FF47;
  padding: 14px 28px;
  text-decoration: none;
  transition: background 0.2s;
}
.back:hover { background: #d4eb30; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">WEAR<span>VO</span></div>
  <div class="check">✓</div>
  <h1>You're on the <span>list.</span></h1>
  <p>Welcome to WEARVO. You're one of our first members. We'll reach out personally when we launch — watch your inbox.</p>
  <a href="/" class="back">← Back to WEARVO</a>
</div>
</body>
</html>
